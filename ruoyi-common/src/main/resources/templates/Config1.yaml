port: 7890
socks-port: 7891
allow-lan: true
mode: global
log-level: info
external-controller: 9090
proxies:
- name: ${commodityName}
  type: vless
  server: ${ip}
  port: ${port}
  uuid: ${uuid}
  encryption: none
  udp: true
  skip-cert-verify: true
  tfo: false
  flow: xtls-rprx-vision
  tls: true
  reality-opts:
    public-key: ${publicKey}
    short-id: ${shortId}
  servername: ${serverName}
  client-fingerprint: chrome
  network: tcp
rules: []
dns:
  enable: true
  ipv6: true
  listen: :53
  prefer-h3: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
  - +.lan
  - +.local
  - +.msftconnecttest.com
  - +.msftncsi.com
  - localhost.ptlogin2.qq.com
  - localhost.sec.qq.com
  - localhost.work.weixin.qq.com
  use-hosts: false
  use-system-hosts: false
  nameserver:
  - https://1.1.1.1/dns-query
  - https://dns.google/dns-query
  default-nameserver:
  - tls://223.5.5.5
  - tls://119.29.29.29
  proxy-server-nameserver:
  - https://doh.pub/dns-query
  direct-nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
