# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 18080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn


mybatis-plus  configuration:
  log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: com/example/mapper/xml/*.xml
  global-config:
    db-config:
      update-strategy: not_null


# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: dev
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  mail:
    host: smtp.163.com
    port: 465
    username: a1152581244@163.com
    password: YAihWSt7zX3KbKUj
    protocol: smtps
    properties.mail.smtp.auth: true
    properties.mail.smtp.ssl.enable: true
    default-encoding: UTF-8
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
  transaction:
    default-timeout: 20  # 设置默认事务超时15秒

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: ${TOKEN_SECRET}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*


# 支付平台配置
pay:
  platform:
    # 支付策略版本：v1（小白云OS/MD5签名） 或 v2（佳梦云付/RSA签名），默认v2
    version: v1
    # === V1专用配置（小白云OS，version=v1时生效）===
    v1:
      base-url: ${PAY_BASE_URL}
      pid: ${PAY_PID}
      key: ${PAY_KEY}
      notify-url: ${NOTIFY_URL}
      return-url: ${RETURN_URL}
      wechat-fee-rate: 0.05
      alipay-fee-rate: 0.05
    # === V2专用配置（佳梦云付，version=v2时生效）===
    v2:
      base-url: ${PAY_BASE_URL}
      pid: ${PAY_PID}
      merchant-private-key: ${PAY_KEY}
      platform-public-key: 
      notify-url: ${NOTIFY_URL}
      return-url: ${RETURN_URL}
      sign-type: RSA
      connect-timeout: 5000
      read-timeout: 10000
      wechat-fee-rate: 0.07
      alipay-fee-rate: 0.07
